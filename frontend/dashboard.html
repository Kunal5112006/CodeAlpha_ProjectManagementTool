<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div>
        <h2>TaskFlow</h2>
        <p>Project Management Tool</p>
    </div>

    <div class="user-box">
        <span id="userName">User</span>
        <button onclick="logoutUser()">Logout</button>
    </div>
</header>

<main class="dashboard">
    <aside class="sidebar">
        <h3>Create Project</h3>

        <input type="text" id="projectTitle" placeholder="Project title">
        <textarea id="projectDescription" placeholder="Project description"></textarea>
        <button onclick="createProject()">Add Project</button>

        <h3 class="mt">My Projects</h3>
        <div id="projectsList"></div>
    </aside>

    <section class="content">
        <div class="project-header">
            <div>
                <h2 id="selectedProjectTitle">Select a Project</h2>
                <p id="selectedProjectDescription">Choose a project from left side.</p>
            </div>

            <button id="deleteProjectBtn" class="delete-project hide" onclick="deleteSelectedProject()">
                Delete Project
            </button>
        </div>

        <div id="taskFormBox" class="task-form-box hide">
            <h3>Add Task</h3>

            <input type="text" id="taskTitle" placeholder="Task title">
            <textarea id="taskDescription" placeholder="Task description"></textarea>

            <select id="taskStatus">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>

            <button onclick="createTask()">Add Task</button>
        </div>

        <div class="board">
            <div class="column">
                <h3>Pending</h3>
                <div id="pendingTasks"></div>
            </div>

            <div class="column">
                <h3>In Progress</h3>
                <div id="progressTasks"></div>
            </div>

            <div class="column">
                <h3>Completed</h3>
                <div id="completedTasks"></div>
            </div>
        </div>
    </section>
</main>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
